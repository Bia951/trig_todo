name: Build

on:
  workflow_call:
    inputs:
      build_mode:
        description: Flutter build mode.
        required: false
        default: release
        type: string
      upload_to_release:
        description: Upload generated artifacts to an existing GitHub release.
        required: false
        default: false
        type: boolean
      release_tag:
        description: Git tag of the GitHub release to upload to.
        required: false
        default: ""
        type: string
  workflow_dispatch:
    inputs:
      build_mode:
        description: Flutter build mode.
        required: false
        default: release
        type: choice
        options:
          - debug
          - release
      upload_to_release:
        description: Upload generated artifacts to an existing GitHub release.
        required: false
        default: false
        type: boolean
      release_tag:
        description: Git tag of the GitHub release to upload to.
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build universal Android APK
        run: flutter build apk --${{ inputs.build_mode }}

      - name: Build ABI split Android APKs
        run: flutter build apk --${{ inputs.build_mode }} --split-per-abi

      - name: Prepare Android artifact
        run: |
          mkdir -p dist
          cp "build/app/outputs/flutter-apk/app-${{ inputs.build_mode }}.apk" \
            "dist/trig-android-universal-${{ inputs.build_mode }}.apk"
          cp "build/app/outputs/flutter-apk/app-x86_64-${{ inputs.build_mode }}.apk" \
            "dist/trig-android-x86_64-${{ inputs.build_mode }}.apk"
          cp "build/app/outputs/flutter-apk/app-arm64-v8a-${{ inputs.build_mode }}.apk" \
            "dist/trig-android-aarch64-${{ inputs.build_mode }}.apk"
          cp "build/app/outputs/flutter-apk/app-armeabi-v7a-${{ inputs.build_mode }}.apk" \
            "dist/trig-android-armv7-${{ inputs.build_mode }}.apk"

      - name: Upload Android workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ inputs.build_mode }}
          path: |
            dist/trig-android-universal-${{ inputs.build_mode }}.apk
            dist/trig-android-x86_64-${{ inputs.build_mode }}.apk
            dist/trig-android-aarch64-${{ inputs.build_mode }}.apk
            dist/trig-android-armv7-${{ inputs.build_mode }}.apk

      - name: Upload Android asset to release
        if: ${{ inputs.upload_to_release && inputs.release_tag != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ inputs.release_tag }}" \
            "dist/trig-android-universal-${{ inputs.build_mode }}.apk" \
            "dist/trig-android-x86_64-${{ inputs.build_mode }}.apk" \
            "dist/trig-android-aarch64-${{ inputs.build_mode }}.apk" \
            "dist/trig-android-armv7-${{ inputs.build_mode }}.apk" \
            --clobber

  build-linux:
    name: Build Linux Bundle and Packages
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch_label: x86_64
            deb_arch: amd64
            rpm_arch: x86_64
          - runner: ubuntu-24.04-arm
            arch_label: aarch64
            deb_arch: arm64
            rpm_arch: aarch64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux build and packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            flatpak \
            flatpak-builder \
            libgtk-3-dev \
            ninja-build \
            ostree \
            patchelf \
            rpm \
            ruby \
            ruby-dev
          sudo gem install --no-document fpm

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build Linux bundle
        run: flutter build linux --${{ inputs.build_mode }}

      - name: Prepare Linux artifacts
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p \
            dist \
            package-root/opt/trig \
            package-root/usr/bin \
            flatpak-stage/trig
          build_dir="release"
          if [ "${{ inputs.build_mode }}" = "debug" ]; then
            build_dir="debug"
          fi
          bundle_dir=$(find build/linux -type d -path "*/${build_dir}/bundle" | head -n 1)
          if [ -z "$bundle_dir" ]; then
            echo "Unable to locate Linux bundle directory." >&2
            exit 1
          fi

          version_line=$(awk '/^version:/{print $2}' pubspec.yaml)
          version_name="${version_line%%+*}"
          build_number="${version_line#*+}"
          if [ "$build_number" = "$version_line" ]; then
            build_number="1"
          fi

          cp -R "${bundle_dir}/"* package-root/opt/trig/
          cp -R "${bundle_dir}/"* flatpak-stage/trig/

          cat > package-root/usr/bin/trig <<'EOF'
          #!/usr/bin/env bash
          exec /opt/trig/trig "$@"
          EOF
          chmod +x package-root/usr/bin/trig

          cat > flatpak-stage/trig-launcher.sh <<'EOF'
          #!/usr/bin/env bash
          exec /app/trig/trig "$@"
          EOF
          chmod +x flatpak-stage/trig-launcher.sh

          tar -C "$(dirname "$bundle_dir")" -czf \
            "dist/trig-linux-${{ matrix.arch_label }}-${{ inputs.build_mode }}.tar.gz" \
            bundle

          fpm -s dir -t deb \
            -n trig \
            -v "$version_name" \
            --iteration "$build_number" \
            --architecture "${{ matrix.deb_arch }}" \
            --package "dist/trig-linux-${{ matrix.arch_label }}-${{ inputs.build_mode }}.deb" \
            --description "Trig Todo App" \
            -C package-root \
            .

          fpm -s dir -t rpm \
            -n trig \
            -v "$version_name" \
            --iteration "$build_number" \
            --architecture "${{ matrix.rpm_arch }}" \
            --package "dist/trig-linux-${{ matrix.arch_label }}-${{ inputs.build_mode }}.rpm" \
            --description "Trig Todo App" \
            -C package-root \
            .

          flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install -y flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08

          cat > flatpak-stage/com.bia951.trig.yml <<'EOF'
          app-id: com.bia951.trig
          runtime: org.freedesktop.Platform
          runtime-version: '24.08'
          sdk: org.freedesktop.Sdk
          command: trig-launcher
          finish-args:
            - --share=network
            - --socket=wayland
            - --socket=fallback-x11
            - --device=dri
          modules:
            - name: trig
              buildsystem: simple
              build-commands:
                - install -d /app/trig /app/bin
                - cp -r trig/. /app/trig/
                - install -Dm755 trig-launcher.sh /app/bin/trig-launcher
              sources:
                - type: dir
                  path: trig
                - type: file
                  path: trig-launcher.sh
          EOF

          flatpak-builder \
            --force-clean \
            --repo=flatpak-repo \
            flatpak-build-dir \
            flatpak-stage/com.bia951.trig.yml
          flatpak build-bundle \
            flatpak-repo \
            "dist/trig-linux-${{ matrix.arch_label }}-${{ inputs.build_mode }}.flatpak" \
            com.bia951.trig

      - name: Upload Linux workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch_label }}-${{ inputs.build_mode }}
          path: |
            dist/trig-linux-${{ matrix.arch_label }}-${{ inputs.build_mode }}.tar.gz
            dist/trig-linux-${{ matrix.arch_label }}-${{ inputs.build_mode }}.deb
            dist/trig-linux-${{ matrix.arch_label }}-${{ inputs.build_mode }}.rpm
            dist/trig-linux-${{ matrix.arch_label }}-${{ inputs.build_mode }}.flatpak

      - name: Upload Linux assets to release
        if: ${{ inputs.upload_to_release && inputs.release_tag != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "${{ inputs.release_tag }}" \
            "dist/trig-linux-${{ matrix.arch_label }}-${{ inputs.build_mode }}.tar.gz" \
            "dist/trig-linux-${{ matrix.arch_label }}-${{ inputs.build_mode }}.deb" \
            "dist/trig-linux-${{ matrix.arch_label }}-${{ inputs.build_mode }}.rpm" \
            "dist/trig-linux-${{ matrix.arch_label }}-${{ inputs.build_mode }}.flatpak" \
            --clobber

  build-macos:
    name: Build macOS App
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            arch_label: x86_64
          - runner: macos-latest
            arch_label: aarch64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Install macOS packaging tools
        run: |
          brew install create-dmg imagemagick

      - name: Build macOS app bundle
        run: flutter build macos --${{ inputs.build_mode }}

      - name: Prepare macOS artifact
        run: |
          mkdir -p dist
          build_dir="Debug"
          if [ "${{ inputs.build_mode }}" = "release" ]; then
            build_dir="Release"
          fi
          app_name=$(find "build/macos/Build/Products/${build_dir}" -maxdepth 1 -name "*.app" -print -quit)
          app_basename=$(basename "$app_name")
          magick -size 800x480 canvas:none dist/dmg-background.png
          create-dmg \
            --volname "Trig" \
            --window-size 800 480 \
            --icon-size 128 \
            --icon "$app_basename" 220 240 \
            --app-drop-link 580 240 \
            --background dist/dmg-background.png \
            "dist/trig-macos-${{ matrix.arch_label }}-${{ inputs.build_mode }}.dmg" \
            "build/macos/Build/Products/${build_dir}/"

      - name: Upload macOS workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch_label }}-${{ inputs.build_mode }}
          path: dist/trig-macos-${{ matrix.arch_label }}-${{ inputs.build_mode }}.dmg

      - name: Upload macOS asset to release
        if: ${{ inputs.upload_to_release && inputs.release_tag != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ inputs.release_tag }}" \
            "dist/trig-macos-${{ matrix.arch_label }}-${{ inputs.build_mode }}.dmg" \
            --clobber

  build-windows:
    name: Build Windows App
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            arch_label: x86_64
          - runner: windows-11-arm
            arch_label: aarch64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build Windows app
        run: flutter build windows --${{ inputs.build_mode }}

      - name: Install Windows packaging tools
        shell: pwsh
        run: |
          choco install innosetup wixtoolset --yes

      - name: Resolve Windows tooling paths
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $innoCandidates = @(
            (Get-Command ISCC.exe -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source -ErrorAction SilentlyContinue),
            "$env:ProgramFiles(x86)\Inno Setup 6\ISCC.exe",
            "$env:ProgramFiles\Inno Setup 6\ISCC.exe"
          ) | Where-Object { $_ -and (Test-Path $_) }
          $innoPath = $innoCandidates | Select-Object -First 1
          if (-not $innoPath) {
            throw "ISCC.exe not found after installing Inno Setup."
          }

          $wixBinDir = @("$env:ProgramFiles(x86)", "$env:ProgramFiles") |
            Where-Object { $_ -and (Test-Path $_) } |
            ForEach-Object {
              Get-ChildItem $_ -Directory -Filter "WiX Toolset*" -ErrorAction SilentlyContinue |
                ForEach-Object { Join-Path $_.FullName "bin" }
            } |
            Where-Object { Test-Path (Join-Path $_ "heat.exe") } |
            Sort-Object -Descending |
            Select-Object -First 1

          if (-not $wixBinDir) {
            throw "WiX Toolset bin directory not found after installation."
          }

          "INNO_ISCC=$innoPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "WIX_BIN_DIR=$wixBinDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Prepare Windows installers
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          New-Item -ItemType Directory -Path installer-temp -Force | Out-Null

          $buildDir = if ("${{ inputs.build_mode }}" -eq "release") { "Release" } else { "Debug" }
          $exeFile = Get-ChildItem build/windows -Recurse -Filter trig.exe |
            Where-Object { $_.FullName -match "\\runner\\$buildDir\\" } |
            Select-Object -First 1
          if (-not $exeFile) {
            throw "Unable to locate built trig.exe under build/windows."
          }
          $appDir = $exeFile.Directory.FullName
          $versionLine = (Get-Content pubspec.yaml | Select-String '^version:' | ForEach-Object { $_.ToString().Split(':')[1].Trim() })
          $versionName = $versionLine.Split('+')[0]

          @"
          [Setup]
          AppName=Trig
          AppVersion=$versionName
          DefaultDirName={autopf}\Trig
          DefaultGroupName=Trig
          OutputDir=dist
          OutputBaseFilename=trig-windows-${{ matrix.arch_label }}-${{ inputs.build_mode }}
          Compression=lzma
          SolidCompression=yes

          [Files]
          Source: "$($appDir)\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{group}\Trig"; Filename: "{app}\trig.exe"
          Name: "{autodesktop}\Trig"; Filename: "{app}\trig.exe"
          "@ | Set-Content installer-temp/trig.iss

          & "$env:INNO_ISCC" installer-temp/trig.iss

          & (Join-Path $env:WIX_BIN_DIR "heat.exe") dir "$appDir" `
            -cg AppFiles `
            -dr INSTALLDIR `
            -scom `
            -sreg `
            -srd `
            -gg `
            -var var.SourceDir `
            -out installer-temp/AppFiles.wxs

          @"
          <?xml version="1.0" encoding="UTF-8"?>
          <Wix xmlns="http://schemas.microsoft.com/wix/2006/wi">
            <Product Id="*" Name="Trig" Language="1033" Version="$versionName" Manufacturer="Trig" UpgradeCode="1A0A7A3F-A8DE-4F6F-81F5-E0FDFB929D84">
              <Package InstallerVersion="500" Compressed="yes" InstallScope="perMachine" />
              <MajorUpgrade DowngradeErrorMessage="A newer version of Trig is already installed." />
              <MediaTemplate EmbedCab="yes" />
              <Directory Id="TARGETDIR" Name="SourceDir">
                <Directory Id="ProgramFilesFolder">
                  <Directory Id="INSTALLDIR" Name="Trig" />
                </Directory>
              </Directory>
              <Feature Id="ProductFeature" Title="Trig" Level="1">
                <ComponentGroupRef Id="AppFiles" />
              </Feature>
            </Product>
          </Wix>
          "@ | Set-Content installer-temp/trig.wxs

          & (Join-Path $env:WIX_BIN_DIR "candle.exe") `
            -dSourceDir="$appDir" `
            installer-temp/AppFiles.wxs `
            installer-temp/trig.wxs
          & (Join-Path $env:WIX_BIN_DIR "light.exe") `
            -o "dist/trig-windows-${{ matrix.arch_label }}-${{ inputs.build_mode }}.msi" `
            AppFiles.wixobj `
            trig.wixobj

      - name: Upload Windows workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch_label }}-${{ inputs.build_mode }}
          path: |
            dist/trig-windows-${{ matrix.arch_label }}-${{ inputs.build_mode }}.exe
            dist/trig-windows-${{ matrix.arch_label }}-${{ inputs.build_mode }}.msi

      - name: Upload Windows asset to release
        if: ${{ inputs.upload_to_release && inputs.release_tag != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release upload "${{ inputs.release_tag }}" `
            "dist/trig-windows-${{ matrix.arch_label }}-${{ inputs.build_mode }}.exe" `
            "dist/trig-windows-${{ matrix.arch_label }}-${{ inputs.build_mode }}.msi" `
            --clobber
